version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/examples/commander"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      commander-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/packages/ginext-stubs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      stub-package-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      website-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/ci"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
