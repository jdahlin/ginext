[project]
name = "ginext-stubs"
version = "0.8.2"
description = "PEP 561 type stubs for ginext's native namespaces (from ginext import Gtk, ...)"
readme = { content-type = "text/markdown", text = """
# ginext-stubs

PEP 561 type stubs for ginext's native namespaces (from ginext import Gtk, ...)

Part of [ginext](https://github.com/jdahlin/ginext) — fast, lazy, JIT-compiled GObject-introspection bindings for free-threaded Python.
""" }
requires-python = ">=3.14"
license = "LGPL-2.1-or-later"
authors = [{ name = "Johan Dahlin", email = "jdahlin@gmail.com" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://github.com/jdahlin/ginext"
Repository = "https://github.com/jdahlin/ginext"
Issues = "https://github.com/jdahlin/ginext/issues"

[build-system]
requires = ["hatchling"]
build-backend = "backend"
backend-path = ["."]

# PEP 561 stub-only distribution for the `ginext` package: ship `ginext/*.pyi`
# so type checkers can resolve `from ginext import Gtk` against the generated
# namespace modules.
[tool.hatch.build.targets.wheel]
include = ["ginext/**"]

[tool.hatch.build.targets.wheel.force-include]
"ginext" = "ginext"

[tool.ruff]
# The <NS>.pyi files are generated by ginext-stubgen; don't lint them.
extend = "../../pyproject.toml"
exclude = ["ginext"]
