; meson native file for building ginext on Windows ARM64 with clang-cl.
; clang-cl gives us GNU extensions (__attribute__((cleanup)), g_autoptr, ...)
; while producing MSVC-ABI objects that link against the MSVC CRT + Windows SDK.
; Run from an env where vcvarsall.bat arm64 has been sourced (for INCLUDE/LIB)
; and C:\LLVM\bin is on PATH (for clang-cl/lld-link), and PKG_CONFIG_PATH points
; at the vcpkg arm64-windows pkgconfig dir.
[binaries]
c = 'clang-cl'
cpp = 'clang-cl'
c_ld = 'lld-link'
pkg-config = 'C:\\dev\\vcpkg\\installed\\arm64-windows\\tools\\pkgconf\\pkgconf.exe'

[properties]
pkg_config_libdir = 'C:\\dev\\vcpkg\\installed\\arm64-windows\\lib\\pkgconfig'
