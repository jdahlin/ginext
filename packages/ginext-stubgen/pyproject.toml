[project]
name = "ginext-stubgen"
version = "0.8.2"
description = "GIR-XML → PEP 561 .pyi stub generator for ginext"
requires-python = ">=3.14"

[project.scripts]
ginext-stubgen = "ginext_stubgen.__main__:main_cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ginext_stubgen"]

[tool.hatch.build.targets.wheel.force-include]
"src/ginext_stubgen/native_overlays.toml" = "ginext_stubgen/native_overlays.toml"
"src/ginext_stubgen/native_mode_overlays.toml" = "ginext_stubgen/native_mode_overlays.toml"

[tool.mypy]
exclude = ["^build/"]

[tool.ruff]
extend = "../../pyproject.toml"

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["SLF001", "E402"]

[tool.pytest.ini_options]
addopts = "-p no:benchmark --import-mode=importlib"
testpaths = ["tests"]
pythonpath = ["src"]
