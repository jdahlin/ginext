[project]
name = "ginext-gtk"
version = "0.8.1"
description = "Gtk and Gdk namespace overlays for ginext"
readme = { content-type = "text/markdown", text = """
# ginext-gtk

Gtk and Gdk namespace overlays for ginext

Part of [ginext](https://github.com/jdahlin/ginext) — fast, lazy, JIT-compiled GObject-introspection bindings for free-threaded Python.
""" }
requires-python = ">=3.14"
license = "LGPL-2.1-or-later"
authors = [{ name = "Johan Dahlin", email = "jdahlin@gmail.com" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = ["ginext-core>=0.8.1", "ginext-gio>=0.8.1", "pycairo"]

[project.entry-points."ginext.overlays"]
Gtk = "ginext_gtk:_overlays.Gtk"
Gdk = "ginext_gtk:_overlays.Gdk"
Pango = "ginext_gtk:_overlays.Pango"
Gsk = "ginext_gtk:_overlays.Gsk"

[project.entry-points."ginext.implied_defaults"]
gtk = "ginext_gtk._defaults:IMPLIED_DEFAULTS"

[project.urls]
Homepage = "https://github.com/jdahlin/ginext"
Repository = "https://github.com/jdahlin/ginext"
Issues = "https://github.com/jdahlin/ginext/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ginext_gtk"]

[tool.ruff]
extend = "../../pyproject.toml"

[tool.ruff.lint.per-file-ignores]
"src/ginext_gtk/_gtktemplate.py" = ["SLF001"]
"src/ginext_gtk/_overlays/Pango.py" = ["SLF001"]
"tests/**/*.py" = ["SLF001", "E402"]

[tool.pytest.ini_options]
addopts = "-p no:benchmark --import-mode=importlib"
testpaths = ["tests"]
pythonpath = ["../.."]
markers = [
    "gtk3: test imports or initializes Gtk/Gdk 3",
    "gtk4: test imports or initializes Gtk/Gdk 4",
]
filterwarnings = [
    "ignore:'asyncio\\.get_event_loop_policy' is deprecated and slated for removal in Python 3\\.16:DeprecationWarning",
    "ignore:'asyncio\\.set_event_loop_policy' is deprecated and slated for removal in Python 3\\.16:DeprecationWarning",
    "ignore:.* positional/keyword construction is deprecated:DeprecationWarning",
]
