name: Release

# Manual release. Run from the Actions tab ("Release" -> Run workflow) on main
# and enter the version (e.g. 0.8.3). The flow is build-then-tag: the version is
# stamped with scripts/bump_version.py (the single source of truth for every
# package number + inter-package pin), everything is built and published to
# PyPI, and ONLY after that succeeds is the bump committed to main, a GitHub
# Release created with all the artifacts, and the vX.Y.Z tag created. So a tag
# never points at a release that failed to build or publish.
#
# PyPI auth is Trusted Publishing (OIDC) — no API token secret. Each project
# (gi, ginext-core, ginext-gio, ginext-gtk, ginext-gst, ginext-libsoup,
# ginext-gi-compat, ginext-stubs) must have a trusted publisher configured for
# repo jdahlin/ginext, workflow release.yml, environment pypi.
#
# Note: the finalize job pushes the bump commit to main. main's branch
# protection must allow the github-actions bot to push (add it to the bypass
# list), otherwise that step fails.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.8.3 (no leading v)"
        required: true
        type: string

permissions:
  contents: read
  packages: read # pull the CI image from GHCR

env:
  IMAGE: ghcr.io/jdahlin/ginext-ci

jobs:
  # Validate the version string and resolve the CI image tag (same content-hash
  # scheme as ci.yml) used to build the core sdist.
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ inputs.version }}
      prerelease: ${{ steps.v.outputs.prerelease }}
      image: ${{ steps.img.outputs.ref }}
    steps:
      - uses: actions/checkout@v6
      - id: v
        run: |
          v="${{ inputs.version }}"
          if ! printf '%s' "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([._-]?(a|b|rc|dev|post)[0-9]+)?$'; then
            echo "::error::invalid version '$v' (expected e.g. 0.8.3 or 0.8.3rc1)"; exit 1
          fi
          if printf '%s' "$v" | grep -qiE '(a|b|rc|dev)[0-9]*$'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - id: img
        run: echo "ref=${IMAGE}:$(sha256sum ci/Dockerfile | cut -c1-16)" >> "$GITHUB_OUTPUT"

  # Build inside the CI image: it carries the GLib / girepository-2.0 / libffi dev
  # headers that the core's meson-python sdist (`meson dist` → configure) needs,
  # plus uv. Pure-Python overlays produce py3-none-any wheels; the native core
  # produces an sdist only (binary core wheels come from a later cibuildwheel job).
  build:
    needs: guard
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.guard.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Stamp version
        run: python3 scripts/bump_version.py "${{ needs.guard.outputs.version }}"
      - name: Build distributions
        run: |
          set -eux
          # meson dist (core sdist) shells out to git; the container runs as root
          # while the checkout is owned by another uid, so git refuses with
          # "dubious ownership" and meson reports "only works with Git repos".
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          rm -rf dist && mkdir -p dist
          # The standard PEP 517 `build` frontend (full isolation, ignores the
          # repo's uv-workspace no-build-isolation config).
          #   --python 3.14: build against a uv-managed CPython 3.14, which ships
          #     the dev headers (Python.h) the core's meson sdist needs and which
          #     the CI image's bare python3 lacks; it also satisfies the packages'
          #     requires-python >=3.14.
          #   --with virtualenv: create the isolated build env with virtualenv
          #     (bundles pip) instead of venv+ensurepip, which the image lacks.
          build() { uvx --python 3.14 --with virtualenv --from build pyproject-build "$@"; }
          for pkg in gi ginext-gio ginext-gtk ginext-gst ginext-libsoup \
                     ginext-gi-compat; do
            build --outdir dist "packages/$pkg"
          done
          # ginext-stubs has a custom wheel-only backend (no build_sdist); its
          # wheel is generated from GIR at build time.
          build --wheel --outdir dist packages/ginext-stubs
          # Native core: sdist only for now.
          build --sdist --outdir dist .
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: [guard, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      # Trusted Publishing (OIDC): no token. `password` resolves to empty when
      # the PYPI_API_TOKEN secret is unset, which makes the action use OIDC.
      # skip-existing makes re-runs idempotent (already-uploaded files are kept).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # Only after a successful build + publish: commit the bump to main, create the
  # GitHub Release with every dist attached, and create the vX.Y.Z tag (gh makes
  # the tag at the pushed commit). This is what makes the tag "build-then-tag".
  finalize:
    needs: [guard, build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Commit version bump
        run: |
          set -eux
          python3 scripts/bump_version.py "${{ needs.guard.outputs.version }}"
          # No-op if the version is already on the branch (e.g. it was bumped via
          # a PR beforehand) — then we just tag/release the current HEAD.
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "Release ${{ needs.guard.outputs.version }}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ needs.guard.outputs.version }}
        run: |
          gh release create "v${V}" dist/* \
            --target "$RELEASE_SHA" \
            --title "v${V}" \
            --generate-notes \
            ${{ needs.guard.outputs.prerelease == 'true' && '--prerelease' || '' }}
