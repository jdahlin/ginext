[project]
name = "ginext-stubs"
version = "0.0.1"
description = "PEP 561 type stubs for ginext's native namespaces (from ginext import Gtk, ...)"
requires-python = ">=3.14"

[build-system]
requires = ["hatchling"]
build-backend = "backend"
backend-path = ["."]

# PEP 561 stub-only distribution: the `ginext-stubs/` directory (hyphenated, not
# an importable package) carries `<NS>.pyi` per namespace plus __init__.pyi.
[tool.hatch.build.targets.wheel]
include = ["ginext-stubs/**"]

[tool.hatch.build.targets.wheel.force-include]
"ginext-stubs" = "ginext-stubs"

[tool.ruff]
# The <NS>.pyi files are generated by ginext-stubgen; don't lint them.
extend = "../../pyproject.toml"
exclude = ["ginext-stubs"]
