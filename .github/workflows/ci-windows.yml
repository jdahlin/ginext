name: CI (Windows)

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pin vcpkg (the tool + its registry) so builds are reproducible across runs
  # and runner-image updates. Matches the default-registry baseline in
  # vcpkg-configuration.json.
  VCPKG_COMMIT: "059d760472984042e1b4db0d40efd935a1adcbc9"
  # Pin LLVM so clang-cl is identical across runs and architectures.
  LLVM_VERSION: "20.1.8"

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x64
            runner: windows-latest
            triplet: x64-windows
            llvm_asset: win64
          - name: arm64
            runner: windows-11-arm
            triplet: arm64-windows
            llvm_asset: woa64
    runs-on: ${{ matrix.runner }}
    env:
      GINEXT_TRIPLET: ${{ matrix.triplet }}
      GINEXT_LLVM: C:\LLVM
      GINEXT_VS: C:\Program Files\Microsoft Visual Studio\2022\Enterprise
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      # Cache built ports in the GitHub Actions cache (read+write).
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
    steps:
      - uses: actions/checkout@v4

      # Expose the GitHub Actions cache backend to vcpkg's x-gha binary source
      # (run-vcpkg caches the vcpkg tool itself; x-gha caches the built packages).
      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Native CPython 3.14 (the ginext build/runtime Python). setup-python
      # provides arm64 builds on windows-11-arm.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v5

      # Pinned LLVM (clang-cl + lld-link). The NSIS installer supports /S silent
      # install; woa64 asset is the native Windows-on-ARM build.
      - name: Install LLVM ${{ env.LLVM_VERSION }} (${{ matrix.llvm_asset }})
        shell: pwsh
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$env:LLVM_VERSION/LLVM-$env:LLVM_VERSION-${{ matrix.llvm_asset }}.exe"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\llvm.exe"
          Start-Process -FilePath "$env:RUNNER_TEMP\llvm.exe" -ArgumentList "/S","/D=C:\LLVM" -Wait
          & "C:\LLVM\bin\clang-cl.exe" --version

      # Locate the VS install on the runner (Enterprise on hosted images).
      - name: Resolve Visual Studio install
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { throw "no Visual Studio install found" }
          "GINEXT_VS=$vs" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "VS: $vs"

      # Provision a pinned vcpkg (tool cached via the GH cache) and run the
      # manifest install for the repo-root vcpkg.json. Default feature set only
      # (no gtk/gstreamer) to keep build time bounded; the x-gha binary cache
      # makes subsequent runs fast. Sets VCPKG_ROOT for the later build steps.
      - name: vcpkg (manifest install)
        uses: lukka/run-vcpkg@v11
        timeout-minutes: 180
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgJsonGlob: "vcpkg.json"
          runVcpkgInstall: true

      - name: Setup build venv
        shell: pwsh
        run: |
          $env:GINEXT_BASE_PYTHON = (Get-Command python).Source
          & tools\win\setup.ps1

      - name: Build ginext
        shell: pwsh
        # Call directly (not `powershell -File`), so the [switch] binds the
        # boolean $false instead of the literal string "$false".
        run: '& tools\win\build.ps1 -WithGiTests:$false'

      # Core suite: the glib-gir overlay supplies GIRepository-3.0 + the Win32
      # platform typelibs, so the core tests run without any out-of-band typelibs.
      # (gtk/gstreamer suites need their introspection overlays -- tracked
      # follow-up, see tools/win/BOOTSTRAP.md.)
      - name: Run core suite
        shell: pwsh
        run: |
          . tools\win\build-env.ps1
          $arch = $env:GINEXT_TRIPLET -replace '-windows$',''
          & ".venv-win-$arch\Scripts\python.exe" tools\win\run_tests.py src/ginext/tests/ -q
