[project]
name = "ginext-gst"
version = "0.0.1"
description = "GStreamer namespace overlay for ginext"
requires-python = ">=3.14"
dependencies = ["ginext>=0.0.1"]

[project.entry-points."ginext.overlays"]
Gst = "ginext_gst:_overlays.Gst"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ginext_gst"]

[tool.ruff]
extend = "../../pyproject.toml"

[tool.ruff.lint.per-file-ignores]
"src/ginext_gst/_overlays/Gst.py" = ["F811", "A001", "TID251"]
"tests/**/*.py" = ["SLF001", "E402"]

[tool.pytest.ini_options]
addopts = "-p no:benchmark --dist=loadgroup --import-mode=importlib"
testpaths = ["tests"]
pythonpath = ["../.."]
filterwarnings = [
    "ignore:.* positional/keyword construction is deprecated:DeprecationWarning",
]
