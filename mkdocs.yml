site_name: ginext
site_description: Modern Python bindings for GObject Introspection
site_url: https://jdahlin.github.io/ginext/
repo_url: https://github.com/jdahlin/ginext
repo_name: jdahlin/ginext

docs_dir: docs

# Kept in the repo but not part of the published site: the old long-form book
# and the internal design notes.
exclude_docs: |
  book/
  internals/
  README.md
  stubgen.md

theme:
  name: material
  logo: assets/ginext-orbit.svg
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.prune
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  # Infers the API nav (Home > API > <Namespace> > <Class>) from the generated
  # docs/api/** directory tree.
  - literate-nav:
      nav_file: SUMMARY.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

extra_css:
  - assets/styles.css

nav:
  - Home: index.md
  - Docs:
      - Introduction: introduction.md
      - Getting Started:
          - Overview: getting-started/index.md
          - Installation: getting-started/installation.md
          - Playground: getting-started/playground.md
          - Gallery: getting-started/gallery.md
      - Guides:
          - Overview: guides/index.md
          - Application Structure: guides/application-structure.md
          - Constructors and Namespaces: guides/constructors-and-namespaces.md
          - Properties: guides/properties.md
          - Signals: guides/signals.md
          - Subclassing: guides/subclassing.md
          - Concurrency: guides/concurrency.md
          - Async Errors and Event Loops: guides/async-errors-and-event-loops.md
          - Gio: guides/gio.md
          - Gtk: guides/gtk.md
          - Gdk: guides/gdk.md
          - Pango: guides/pango.md
          - Type Checking: guides/type-checking.md
          - Migration from PyGObject: guides/migration-from-pygobject.md
      - Advanced Guide:
          - Overview: advanced-guide/index.md
          - Overlays: advanced-guide/overlays/index.md
      - Performance: performance.md
      - Why a New API?: why-a-new-api.md
      - Upgrading: upgrading.md
  - API: api/
  - Gallery: gallery/index.md
