site_name: goi
site_description: GTK and GNOME app development with Python, via GObject Introspection
site_url: https://example.invalid/goi/
repo_url: https://github.com/jdahlin/goi
docs_dir: docs/book

theme:
  name: material
  features:
    # Two-pane layout: nav on the left, in-page TOC on the right.
    # Sections start collapsed; only the active section expands.
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.prune     # don't render off-screen Parts in the DOM
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys

plugins:
  - search
  # Future plugins to wire up:
  # - mkdocstrings:        # auto-generate API reference from overlays
  #     handlers:
  #       python:
  #         paths: [.]
  # - gen-files:           # synthesize per-namespace pages from GIR
  #     scripts:
  #       - scripts/docs/gen_api_pages.py
  # - literate-nav
  # - section-index
  # - macros               # for code snippets pulled from apps/*

