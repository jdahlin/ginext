default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: no-ai-co-authored-by
        name: forbid AI Co-Authored-By trailer
        language: pygrep
        entry: '(?i)^\s*Co-Authored-By:.*(claude|anthropic|gpt|copilot|openai)'
        stages: [commit-msg]

      - id: ruff-check
        name: ruff check
        entry: uv run --no-project --with ruff>=0.15.12 ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: uv run --no-project --with ruff>=0.15.12 ruff format
        language: system
        types_or: [python, pyi]

      - id: ruff-license
        name: ruff license header
        entry: uv run --no-project --with ruff>=0.15.12 ruff check --config ruff-license.toml
        language: system
        types_or: [python, pyi]
        files: ^src/ginext/

      - id: check-noqa
        name: check noqa
        entry: python3 scripts/check_noqa.py
        language: system
        types_or: [python, pyi]

      - id: no-literal-getattr
        name: no getattr with constant string (use direct attribute access)
        language: pygrep
        entry: 'getattr\([^,\n]+,\s*[''"][A-Za-z_][A-Za-z0-9_]*[''"]'
        types_or: [python, pyi]
        exclude: >-
          (?x)^(
            packages/ginext-gi-compat/
          )

      - id: no-unparenthesized-except
        name: no unparenthesized multi-exception except clause
        language: pygrep
        entry: 'except\s+[A-Za-z_][A-Za-z0-9_.]*\s*,\s*[A-Za-z_]'
        types_or: [python, pyi]

      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        files: \.(c|h|cc|cpp|cxx|hh|hpp)$
